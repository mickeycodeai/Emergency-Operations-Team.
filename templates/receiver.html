<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPML Intelligent Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 
<style>
:root {
    --bg-main: #f8f9fa;
    --sidebar-bg: #ffffff;
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --hazard-red: #ef4444;
    --warning-orange: #f59e0b;
    --success-green: #10b981;
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
}

#splash-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity 0.5s ease, visibility 0.5s ease;
}

.splash-logo {
    width: min(60vw, 520px);
    max-width: 90%;
    height: auto;
    animation: popIn 1s ease;
}

@keyframes popIn {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

#splash-screen.hide {
    opacity: 0;
    visibility: hidden;
}

body {
    margin: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    display: grid;
    grid-template-columns: 260px 1fr 340px;
    height: 100vh;
    overflow: hidden;
}

.menu-toggle {
    display: none;
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 1001;
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: var(--shadow);
}

nav {
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.map-legend {
    background: white;
    padding: 12px;
    line-height: 18px;
    color: var(--text-main);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    font-size: 0.75rem;
}
.legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
}
.legend-color {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
    border: 1px solid rgba(0,0,0,0.1);
}
.legend-line {
    width: 15px;
    height: 0;
    border-top: 2px dashed #f59e0b;
    margin-right: 8px;
}

.brand-container { padding-bottom: 32px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.brand-name { font-weight: 800; font-size: 1.25rem; color: var(--primary); letter-spacing: -0.025em; }
.nav-link { padding: 10px 12px; border-radius: 6px; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
.nav-link:hover { background: #f1f5f9; color: var(--text-main); }
.nav-link.active { background: #eff6ff; color: var(--primary); }

main { padding: 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
.section-title { font-size: 1.125rem; font-weight: 600; }
.data-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 20px; box-shadow: var(--shadow); overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; min-width: 600px; }
th { text-align: left; padding: 12px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); }
td { padding: 16px 12px; border-bottom: 1px solid var(--border); }
.status-pill { padding: 4px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
.status-red { background: #fee2e2; color: #b91c1c; }
.status-orange { background: #ffedd5; color: #9a3412; }
.status-green { background: #dcfce7; color: #15803d; }

aside { background: var(--sidebar-bg); border-left: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 24px; }
.risk-overview { text-align: center; padding: 24px; background: #f8fafc; border-radius: 12px; border: 1px solid var(--border); }
.risk-score { font-size: 3rem; font-weight: 800; color: var(--success-green); line-height: 1; margin: 8px 0; transition: color 0.3s ease; }

.log-item { padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.75rem; }
.log-meta { color: var(--text-muted); margin-bottom: 4px; display: block; }

/* Responsive Design */
@media (max-width: 1024px) {
    body {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        overflow: auto;
    }
    nav {
        position: fixed;
        top: 0;
        left: -280px;
        width: 260px;
        height: 100vh;
        z-index: 1000;
        transition: left 0.3s ease;
        box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }
    nav.open {
        left: 0;
    }
    .menu-toggle {
        display: block;
    }
    main {
        flex: 1;
        padding: 70px 16px 16px 16px;
        overflow-y: visible;
    }
    aside {
        border-left: none;
        border-top: 1px solid var(--border);
    }
}

@media (max-width: 768px) {
    .section-title { font-size: 1rem; }
    .data-card { padding: 12px; }
    main { padding: 60px 12px 12px 12px; }
    aside { padding: 16px; }
    .risk-score { font-size: 2.5rem; }
    table { min-width: 500px; font-size: 0.8rem; }
    th, td { padding: 10px 8px; }
}
</style>
</head>
<body>

<button id="menu-toggle" class="menu-toggle">☰</button>

<nav>
    <div class="brand-container">
        <div class="brand-name">DPML INTELLIGENT DASHBOARD</div>
        <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">OPERATIONAL INTELLIGENCE</div>
    </div>
    <div class="nav-link active">Intelligence Dashboard</div>
    <div class="nav-link">Incoming Field Data</div>
    <div class="nav-link">Hotspot Analytics</div>
    <div class="nav-link">LGU Reporting Hub</div>
    <div class="nav-link">Audit & Compliance</div>
    <div class="nav-link" style="margin-top: auto;">System Settings</div>
</nav>

<main id="main-content"></main>

<div id="splash-screen">
    <img src="https://cdn.postimage.me/2026/06/24/download.jpg" class="splash-logo">
</div>
    
<aside>
    <div class="section-title">Risk Intelligence</div>
    <div class="risk-overview">
        <span style="font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase;">Computed Risk Index</span>
        <div class="risk-score">0.00</div>
        <span id="risk-status" style="font-size: 0.75rem; color: var(--success-green); font-weight: 700;">NORMAL</span>
    </div>
</aside>

<script>
let refreshInterval = null;
let hotspotMap = null;
let hotspotMarkers = [];
let facilityMarkers = [];
let cityChart = null;
let currentHotspotPoints = [];

const hospitalIcon = L.divIcon({
    html: '<div style="background:#ef4444; color:white; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3); font-size:14px;">H</div>',
    className: '',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
});

const clinicIcon = L.divIcon({
    html: '<div style="background:#10b981; color:white; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; border:2px solid white; box-shadow:0 2px 5px rgba(0,0,0,0.3); font-size:14px;">C</div>',
    className: '',
    iconSize: [28, 28],
    iconAnchor: [14, 14]
});

function stopAutoRefresh(){
    if(refreshInterval){
        clearInterval(refreshInterval);
        refreshInterval = null;
    }
}

function startAutoRefresh(fn, ms=5000){
    stopAutoRefresh();
    fn();
    refreshInterval = setInterval(fn, ms);
}

// ----------------------------
// DATA UTILITIES
// ----------------------------
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

// ----------------------------
// RISK INDEX CALCULATOR
// ----------------------------
async function updateRiskIndex() {
    try {
        const res = await fetch("/api/ingestion");
        if(!res.ok) return;
        const data = await res.json();
        if(data.length === 0) {
            document.querySelector(".risk-score").textContent = "0.00";
            return;
        }
        
        const highRisk = data.filter(d => d.egg_count > 10).length;
        const total = data.length;
        const avgEggs = data.reduce((sum, d) => sum + (d.egg_count || 0), 0) / total;
        
        const highRiskRatio = highRisk / total;
        const normalizedEggs = Math.min(avgEggs / 50, 1);
        
        const riskScore = Math.min((highRiskRatio * 0.7 + normalizedEggs * 0.3), 1).toFixed(2);
        
        const scoreEl = document.querySelector(".risk-score");
        const statusEl = document.getElementById("risk-status");
        
        if(scoreEl) {
            scoreEl.textContent = riskScore;
            if (riskScore >= 0.75) {
                scoreEl.style.color = "var(--hazard-red)";
                if(statusEl) { statusEl.textContent = "THRESHOLD EXCEEDED"; statusEl.style.color = "var(--hazard-red)"; }
            } else if (riskScore >= 0.4) {
                scoreEl.style.color = "var(--warning-orange)";
                if(statusEl) { statusEl.textContent = "MODERATE RISK"; statusEl.style.color = "var(--warning-orange)"; }
            } else {
                scoreEl.style.color = "var(--success-green)";
                if(statusEl) { statusEl.textContent = "NORMAL"; statusEl.style.color = "var(--success-green)"; }
            }
        }
    } catch (e) { console.error("Risk Index Error:", e); }
}

// ----------------------------
// TABLE LOADER
// ----------------------------
async function loadQueue(tbodySelector="table tbody") {
    try {
        const res = await fetch("/api/ingestion");
        if(!res.ok) throw new Error("Failed to fetch ingestion");
        const data = await res.json();
        const tbody = document.querySelector(tbodySelector);
        if(!tbody) return;
        tbody.innerHTML = "";
        data.forEach(entry => {
            const row = document.createElement("tr");
            let riskClass = entry.egg_count > 10 ? "status-red" : "status-green";
            let riskText = entry.egg_count > 10 ? "High" : "Normal";
            row.innerHTML = `
                <td>${entry.trap_id}</td>
                <td>${entry.timestamp}</td>
                <td>${entry.gps}</td>
                <td>${entry.egg_count}</td>
                <td><span class="status-pill ${riskClass}">${riskText}</span></td>
                <td><span class="status-pill ${entry.sha256_valid ? 'status-green' : 'status-red'}">${entry.sha256_valid ? 'Valid' : 'Invalid'}</span></td>
            `;
            tbody.appendChild(row);
        });
    } catch (err) {
        console.error("Failed to load queue:", err);
    }
}

// ----------------------------
// MEDICAL FACILITIES LOADER
// ----------------------------
async function loadMedicalFacilities() {
    if (!hotspotMap) return;
    
    facilityMarkers.forEach(m => hotspotMap.removeLayer(m));
    facilityMarkers = [];

    const bounds = hotspotMap.getBounds();
    const buffer = 0.045; 
    const south = bounds.getSouth() - buffer;
    const north = bounds.getNorth() + buffer;
    const west = bounds.getWest() - buffer;
    const east = bounds.getEast() + buffer;

    const query = `
        [out:json][timeout:25];
        (
            node["amenity"="hospital"](${south},${west},${north},${east});
            node["amenity"="clinic"](${south},${west},${north},${east});
        );
        out body;
    `;

    try {
        const res = await fetch('https://overpass-api.de/api/interpreter', {
            method: 'POST',
            body: query
        });
        const data = await res.json();
        
        const facilities = data.elements.map(el => ({
            lat: el.lat,
            lon: el.lon,
            name: el.tags.name || 'Unknown Facility',
            type: el.tags.amenity
        }));

        facilities.forEach(f => {
            const icon = f.type === 'hospital' ? hospitalIcon : clinicIcon;
            const marker = L.marker([f.lat, f.lon], { icon: icon }).addTo(hotspotMap);
            marker.bindPopup(`<strong>${f.name}</strong><br>Type: ${f.type}`);
            facilityMarkers.push(marker);
        });

        updateNearestFacilitiesList(facilities);

    } catch (e) {
        console.error("Failed to load medical facilities:", e);
        updateNearestFacilitiesList([]);
    }
}

function updateNearestFacilitiesList(facilities) {
    const container = document.querySelector("#hotspot-container");
    if (!container) return;

    let html = "<h4>100m Proximity Alerts</h4>";
    let clustersFound = false;
    for(let i=0; i<currentHotspotPoints.length; i++){
        for(let j=i+1; j<currentHotspotPoints.length; j++){
            const d = getDistance(currentHotspotPoints[i].lat, currentHotspotPoints[i].lng, currentHotspotPoints[j].lat, currentHotspotPoints[j].lng);
            if(d <= 100) {
                clustersFound = true;
                html += `<div class="log-item">
                    <span class="log-meta" style="color:#f59e0b; font-weight:bold;">CLUSTER DETECTED</span>
                    Traps <strong>${currentHotspotPoints[i].trap_id}</strong> & <strong>${currentHotspotPoints[j].trap_id}</strong> are ${Math.round(d)}m apart.
                </div>`;
            }
        }
    }
    if (!clustersFound) {
        html += "<p>No 100m proximity clusters detected.</p>";
    }

    html += "<h4 style='margin-top:20px; border-top:1px solid var(--border); padding-top:12px;'>Nearest Medical Facilities</h4>";
    
    if (currentHotspotPoints.length === 0) {
        html += "<p>No hotspots to analyze.</p>";
    } else {
        currentHotspotPoints.forEach(p => {
            let nearestHospital = null;
            let minHospDist = Infinity;
            let nearestClinic = null;
            let minClinicDist = Infinity;

            facilities.forEach(f => {
                const dist = getDistance(p.lat, p.lng, f.lat, f.lon);
                if (f.type === 'hospital' && dist < minHospDist) {
                    minHospDist = dist;
                    nearestHospital = f;
                } else if (f.type === 'clinic' && dist < minClinicDist) {
                    minClinicDist = dist;
                    nearestClinic = f;
                }
            });

            html += `<div class="log-item">
                <span class="log-meta">Trap: <strong>${p.trap_id}</strong> (${p.egg_count} eggs)</span>
                ${nearestHospital ? `🏥 Hospital: <strong>${nearestHospital.name}</strong> (${(minHospDist/1000).toFixed(2)} km)<br>` : '🏥 No hospital found nearby.<br>'}
                ${nearestClinic ? `🏨 Clinic: <strong>${nearestClinic.name}</strong> (${(minClinicDist/1000).toFixed(2)} km)` : '🏨 No clinic found nearby.'}
            </div>`;
        });
    }
    
    container.innerHTML = html;
}

// ----------------------------
// HOTSPOT MAP + LIST
// ----------------------------
async function loadHotspotMapAndList() {
    try {
        const res = await fetch("/api/ingestion");
        if(!res.ok) throw new Error("Failed to fetch ingestion");
        const data = await res.json();
        const container = document.querySelector("#hotspot-container");
        if(!container) return;

        const points = data.filter(d => d.gps && d.gps.includes(",")).map(d => {
            const [lat, lng] = d.gps.split(",").map(x => parseFloat(x.trim()));
            return { lat, lng, egg_count: d.egg_count, trap_id: d.trap_id };
        });

        currentHotspotPoints = points;

        if(!hotspotMap){
            const startPos = points.length > 0 ? [points[0].lat, points[0].lng] : [14.5995, 120.9842];
            hotspotMap = L.map("map").setView(startPos, 13);
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(hotspotMap);

            const legend = L.control({ position: 'bottomright' });
            legend.onAdd = function () {
                const div = L.DomUtil.create('div', 'map-legend');
                div.innerHTML = `
                    <div style="font-weight:700; margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:4px;">Map Details</div>
                    <div class="legend-item"><div class="legend-color" style="background:#ef4444;"></div><span>High Risk (> 10)</span></div>
                    <div class="legend-item"><div class="legend-color" style="background:#2563eb;"></div><span>Normal Risk</span></div>
                    <div class="legend-item"><div class="legend-line"></div><span>100m Monitoring Zone</span></div>
                    <div class="legend-item"><div style="background:#ef4444; color:white; width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:bold; margin-right:8px;">H</div><span>Hospital</span></div>
                    <div class="legend-item"><div style="background:#10b981; color:white; width:12px; height:12px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:bold; margin-right:8px;">C</div><span>Clinic / Health Center</span></div>
                `;
                return div;
            };
            legend.addTo(hotspotMap);
        }

        hotspotMarkers.forEach(m => hotspotMap.removeLayer(m));
        hotspotMarkers = [];

        points.forEach((p1, i) => {
            const marker = L.circleMarker([p1.lat, p1.lng], {
                radius: 7,
                fillColor: p1.egg_count > 10 ? "#ef4444" : "#2563eb",
                color: "#fff",
                weight: 2,
                fillOpacity: 0.9
            }).addTo(hotspotMap);
            marker.bindPopup(`Trap: ${p1.trap_id}<br>Eggs: ${p1.egg_count}`);
            hotspotMarkers.push(marker);

            const zone = L.circle([p1.lat, p1.lng], {
                radius: 100,
                color: "#ef4444",
                weight: 1,
                dashArray: '5, 5',
                fillColor: "#ef4444", 
                fillOpacity: 0.05,
                interactive: false
            }).addTo(hotspotMap);
            hotspotMarkers.push(zone);
        });

        container.innerHTML = "<p>Loading medical facilities...</p>";
        await loadMedicalFacilities();

    } catch(e) { console.error("Map Update Error:", e); }
}

// ----------------------------
// LGU REPORTING HUB
// ----------------------------
async function loadLGURecords(tbodySelector="table tbody", threshold=10){
    try {
        const res = await fetch("/api/ingestion");
        if(!res.ok) throw new Error("Failed to fetch ingestion");
        const data = await res.json();
        const tbody = document.querySelector(tbodySelector);
        if(!tbody) return;
        tbody.innerHTML = "";
        data.forEach(entry => {
            const row = document.createElement("tr");
            let riskClass = entry.egg_count > threshold ? "status-red" : "status-green";
            let riskText = entry.egg_count > threshold ? "Escalate" : "Normal";
            row.innerHTML = `
                <td>${entry.timestamp}</td>
                <td>${entry.trap_id}</td>
                <td>${entry.trap_type}</td>
                <td>${entry.city || entry.barangay || ""}</td>
                <td>${entry.gps}</td>
                <td>${entry.egg_count}</td>
                <td><span class="status-pill ${riskClass}">${riskText}</span></td>
            `;
            tbody.appendChild(row);
        });
    } catch(err){ console.error("LGU records load error:", err); }
}

async function loadCityThresholdChart(threshold=10){
    try {
        const res = await fetch("/api/ingestion");
        if(!res.ok) throw new Error("Failed to fetch ingestion");
        const data = await res.json();
        const counts = {};
        data.forEach(entry => {
            const cityName = entry.city || entry.barangay || "Unknown";
            if(entry.egg_count > threshold){
                counts[cityName] = (counts[cityName] || 0) + 1;
            }
        });
        const labels = Object.keys(counts);
        const values = Object.values(counts);
        const canvas = document.getElementById("cityChart");
        if(!canvas) return;
        if(cityChart) cityChart.destroy();
        cityChart = new Chart(canvas, {
            type: "bar",
            data: {
                labels: labels,
                datasets: [{
                    label: `City Exceed Count (> ${threshold})`,
                    data: values,
                    backgroundColor: values.map(v => v >= 3 ? "#ef4444" : "#2563eb")
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
            }
        });
    } catch(err){ console.error("City chart load error:", err); }
}

function renderLGUReportingHub(){
    const main = document.getElementById("main-content");
    main.innerHTML = `
        <div class="section-header">
            <h2 class="section-title">LGU Reporting Hub</h2>
            <span style="font-size: 0.75rem; color: var(--text-muted);">Automated monitoring</span>
        </div>
        <div class="data-card">
            <h3 style="margin:0 0 12px 0; font-size:0.95rem; color:var(--text-muted); font-weight:600;">City Summary</h3>
            <canvas id="cityChart" height="120"></canvas>
        </div>
        <div class="data-card">
            <table>
                <thead><tr><th>Timestamp</th><th>Trap ID</th><th>Trap Type</th><th>City</th><th>GPS</th><th>Egg Count</th><th>Status</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    `;
    startAutoRefresh(() => {
        loadLGURecords("#main-content table tbody", 10);
        loadCityThresholdChart(10);
    }, 5000);
}

// ----------------------------
// AUDIT & COMPLIANCE
// ----------------------------
function renderAuditCompliance() {
    const main = document.getElementById("main-content");
    main.innerHTML = `
        <div class="section-header">
            <h2 class="section-title">Audit & Compliance</h2>
            <span style="font-size: 0.75rem; color: var(--text-muted);">System Integrity & Logs</span>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="data-card">
                <h3 style="margin:0 0 12px 0; font-size:0.95rem; color:var(--text-muted); font-weight:600;">System Health</h3>
                <div id="system-health">Loading...</div>
            </div>
            <div class="data-card">
                <h3 style="margin:0 0 12px 0; font-size:0.95rem; color:var(--text-muted); font-weight:600;">Data Integrity Summary</h3>
                <div id="integrity-summary">Loading...</div>
            </div>
        </div>
        <div class="data-card">
            <h3 style="margin:0 0 12px 0; font-size:0.95rem; color:var(--text-muted); font-weight:600;">Recent Audit Logs</h3>
            <table>
                <thead><tr><th>Timestamp</th><th>Trap ID</th><th>SHA-256 Status</th><th>Action</th></tr></thead>
                <tbody id="audit-tbody"></tbody>
            </table>
        </div>
    `;
    
    startAutoRefresh(async () => {
        try {
            const res = await fetch("/api/ingestion");
            if(!res.ok) throw new Error();
            const data = await res.json();
            
            const valid = data.filter(d => d.sha256_valid).length;
            const invalid = data.length - valid;
            
            document.getElementById("system-health").innerHTML = `
                <p style="margin:4px 0;"><strong>Status:</strong> <span class="status-pill status-green">Operational</span></p>
                <p style="margin:4px 0;"><strong>Total Records:</strong> ${data.length}</p>
                <p style="margin:4px 0;"><strong>Last Sync:</strong> ${new Date().toLocaleString()}</p>
            `;
            
            document.getElementById("integrity-summary").innerHTML = `
                <p style="margin:4px 0;"><strong>Valid Hashes:</strong> <span class="status-pill status-green">${valid}</span></p>
                <p style="margin:4px 0;"><strong>Invalid Hashes:</strong> <span class="status-pill ${invalid > 0 ? 'status-red' : 'status-green'}">${invalid}</span></p>
                <p style="margin:4px 0;"><strong>Integrity Rate:</strong> ${data.length > 0 ? ((valid/data.length)*100).toFixed(1) : 0}%</p>
            `;
            
            const tbody = document.getElementById("audit-tbody");
            tbody.innerHTML = "";
            data.slice(-10).reverse().forEach(entry => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${entry.timestamp}</td>
                    <td>${entry.trap_id}</td>
                    <td><span class="status-pill ${entry.sha256_valid ? 'status-green' : 'status-red'}">${entry.sha256_valid ? 'Valid' : 'Invalid'}</span></td>
                    <td>${entry.sha256_valid ? 'Accepted' : 'Flagged for Review'}</td>
                `;
                tbody.appendChild(row);
            });
        } catch(e) {
            console.error(e);
        }
    }, 5000);
}

// ----------------------------
// NAVIGATION HANDLERS
// ----------------------------
const navLinks = document.querySelectorAll("nav .nav-link");
navLinks.forEach(link => {
    link.addEventListener("click", () => {
        navLinks.forEach(l => l.classList.remove("active"));
        link.classList.add("active");
        
        if (window.innerWidth <= 1024) {
            document.querySelector('nav').classList.remove('open');
        }

        const text = link.textContent.trim();
        if(text === "Intelligence Dashboard") renderDashboard();
        if(text === "Incoming Field Data") renderIncomingFieldData();
        if(text === "Hotspot Analytics") renderHotspotAnalytics();
        if(text === "LGU Reporting Hub") renderLGUReportingHub();
        if(text === "Audit & Compliance") renderAuditCompliance();
        if(text === "System Settings") renderSystemSettings();
    });
});

document.getElementById('menu-toggle').addEventListener('click', () => {
    document.querySelector('nav').classList.toggle('open');
});

// INITIALIZATION
// ----------------------------
window.addEventListener("load", () => {
    setTimeout(() => {
        const splash = document.getElementById("splash-screen");
        splash.classList.add("hide");
        setTimeout(() => splash.remove(), 600);
    }, 1200);
});

setInterval(updateRiskIndex, 5000);

renderDashboard();
